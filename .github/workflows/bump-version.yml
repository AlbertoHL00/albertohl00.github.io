name: Bump build version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    if: ${{ !contains(github.event.head_commit.message, '[skip version]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump build number in version.json
        run: |
          current=$(grep -o '[0-9]\+' version.json)
          next=$((current + 1))
          printf '{ "build": %s }\n' "$next" > version.json
          echo "build=$next" >> "$GITHUB_ENV"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "chore: bump build number to ${build} [skip version]"
          git push
