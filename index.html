<title>Game Hub</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text x="50" y="78" font-size="72" text-anchor="middle">%F0%9F%8E%AE</text></svg>'>
<link rel="stylesheet" href="shared.css">
<style>
  html,body{
    /* flat solid fill — a multi-layer gradient here used to leave gaps of
       the raw background color showing on some viewports/scroll ranges */
    background-color:var(--bg2);
  }
  .mode-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:14px;
  }
  .mode-card{
    position:relative;
    aspect-ratio:1 / 1;
    /* grid items default to min-width:auto (sized to fit content) — without
       this, some mobile browsers let the card refuse to shrink to its 1fr
       track and spill past the screen edge */
    min-width:0;
    padding:16px 12px;
    border-radius:18px;
    border:1px solid var(--glass-border);
    background:rgba(255,255,255,0.05);
    color:var(--text);
    opacity:0;
    transition:transform .15s, background .15s, border-color .15s;
  }
  /* cards stay invisible until every icon has preloaded (see the script at
     the bottom) — otherwise they pop in one by one as each icon happens to
     finish loading, instead of appearing together */
  .mode-grid.ready .mode-card{animation:modeIn .5s ease forwards;}
  .mode-grid .mode-card:nth-child(1){animation-delay:.05s;}
  .mode-grid .mode-card:nth-child(2){animation-delay:.1s;}
  .mode-grid .mode-card:nth-child(3){animation-delay:.15s;}
  .mode-grid .mode-card:nth-child(4){animation-delay:.2s;}
  .mode-grid .mode-card:nth-child(5){animation-delay:.25s;}
  .mode-grid .mode-card:nth-child(6){animation-delay:.3s;}
  .mode-grid .mode-card:nth-child(7){animation-delay:.35s;}
  .mode-grid .mode-card:nth-child(8){animation-delay:.4s;}
  .mode-grid .mode-card:nth-child(9){animation-delay:.45s;}
  .mode-grid .mode-card:nth-child(10){animation-delay:.5s;}
  .mode-grid .mode-card:nth-child(11){animation-delay:.55s;}
  .mode-grid .mode-card:nth-child(12){animation-delay:.6s;}
  .mode-grid .mode-card:nth-child(13){animation-delay:.65s;}
  .mode-grid .mode-card:nth-child(14){animation-delay:.7s;}
  @keyframes modeIn{
    from{opacity:0; transform:translateY(10px) scale(0.98);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  .mode-card:active{transform:scale(0.97);}
  .mode-card.theme-blue{border-color:rgba(91,143,224,0.4);}
  .mode-card.theme-blue:active{background:rgba(91,143,224,0.12);}
  .mode-card.theme-red{border-color:rgba(201,82,92,0.4);}
  .mode-card.theme-red:active{background:rgba(201,82,92,0.12);}
  .mode-card.theme-violet{border-color:rgba(139,109,214,0.4);}
  .mode-card.theme-violet:active{background:rgba(139,109,214,0.12);}
  .mode-card.theme-amber{border-color:rgba(217,151,79,0.4);}
  .mode-card.theme-amber:active{background:rgba(217,151,79,0.12);}
  .mode-card.theme-teal{border-color:rgba(63,168,156,0.4);}
  .mode-card.theme-teal:active{background:rgba(63,168,156,0.12);}
  .mode-card.theme-rose{border-color:rgba(201,81,143,0.4);}
  .mode-card.theme-rose:active{background:rgba(201,81,143,0.12);}
  .mode-card.theme-green{border-color:rgba(79,143,107,0.4);}
  .mode-card.theme-green:active{background:rgba(79,143,107,0.12);}
  .mode-card.theme-purple{border-color:rgba(169,112,224,0.4);}
  .mode-card.theme-purple:active{background:rgba(169,112,224,0.12);}
  .mode-card.theme-yellow{border-color:rgba(232,214,107,0.4);}
  .mode-card.theme-yellow:active{background:rgba(232,214,107,0.12);}
  .mode-card.theme-gold{border-color:rgba(242,201,76,0.4);}
  .mode-card.theme-gold:active{background:rgba(242,201,76,0.12);}
  .mode-card.theme-indigo{border-color:rgba(143,159,250,0.4);}
  .mode-card.theme-indigo:active{background:rgba(143,159,250,0.12);}
  .mode-card.theme-lime{border-color:rgba(168,217,106,0.4);}
  .mode-card.theme-lime:active{background:rgba(168,217,106,0.12);}
  .mode-card.theme-steel{border-color:rgba(125,148,171,0.4);}
  .mode-card.theme-steel:active{background:rgba(125,148,171,0.12);}
  .mode-card.theme-orange{border-color:rgba(240,149,79,0.4);}
  .mode-card.theme-orange:active{background:rgba(240,149,79,0.12);}
  .mode-card.disabled{cursor:default;}
  .mode-card.disabled:active{transform:none;}
  .mode-card.disabled.theme-rose:active{background:rgba(255,255,255,0.05);}
  .mode-card.disabled .mode-icon-badge{opacity:0.55;}
  .coming-soon-badge{
    display:inline-block;
    margin-top:6px;
    padding:2px 8px;
    border-radius:999px;
    background:rgba(255,255,255,0.12);
    color:var(--text-dim);
    font-size:0.58rem;
    font-weight:700;
    letter-spacing:0.3px;
    text-transform:none;
  }
  .mode-icon-badge{
    display:block;
    flex:1;
    min-height:0;
    width:100%;
    max-width:100%;
    mask-repeat:no-repeat;
    mask-position:center;
    mask-size:contain;
    -webkit-mask-repeat:no-repeat;
    -webkit-mask-position:center;
    -webkit-mask-size:contain;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,0.3));
  }
  /* placeholder for modes without a custom logo yet — swap for .mode-icon-badge once one exists */
  .mode-icon-emoji{
    display:flex;
    align-items:center;
    justify-content:center;
    flex:1;
    min-height:0;
    font-size:2.4rem;
    line-height:1;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,0.3));
  }
  .mode-card.disabled .mode-icon-emoji{opacity:0.55;}
  .mode-card-link{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    width:100%;
    height:100%;
    min-width:0;
    color:inherit;
    text-decoration:none;
    text-align:center;
  }
  .theme-blue .mode-icon-badge{background-color:#9dc9ff;}
  .theme-red .mode-icon-badge{background-color:#e8929c;}
  .theme-violet .mode-icon-badge{background-color:#c3b1f0;}
  .theme-amber .mode-icon-badge{background-color:#f0c896;}
  .theme-teal .mode-icon-badge{background-color:#9ee0da;}
  .theme-rose .mode-icon-badge{background-color:#eeaed0;}
  .theme-green .mode-icon-badge{background-color:#8fd9ac;}
  .theme-purple .mode-icon-badge{background-color:#a970e0;}
  .theme-lime .mode-icon-badge{background-color:#a8d96a;}
  .theme-steel .mode-icon-badge{background-color:#7d94ab;}
  .theme-yellow .mode-icon-badge{background-color:#e8d66b;}
  .theme-gold .mode-icon-badge{background-color:#f2c94c;}
  .theme-indigo .mode-icon-badge{background-color:#8f9ffa;}
  .theme-orange .mode-icon-badge{background-color:#f0954f;}
  .mode-info-btn{
    position:absolute;
    top:10px;
    right:10px;
    z-index:2;
    flex-shrink:0;
    width:30px;
    height:30px;
    border-radius:50%;
    border:1px solid var(--glass-border);
    background:rgba(255,255,255,0.08);
    color:var(--text-dim);
    font-size:1rem;
    cursor:pointer;
  }
  .mode-info-btn:active{transform:scale(0.9);}

  /* ---- game description overlay: near-opaque black over the page content ---- */
  .desc-overlay-backdrop{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px;
    z-index:1000;
    animation:fadeIn .2s ease;
  }
  .desc-overlay-close{
    position:fixed;
    top:20px;
    right:20px;
    width:36px;
    height:36px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.25);
    background:rgba(255,255,255,0.08);
    color:#fff;
    font-size:1.2rem;
    cursor:pointer;
    z-index:1001;
  }
  .desc-overlay-close:active{transform:scale(0.9);}
  .desc-overlay{
    max-width:380px;
    text-align:center;
  }
  .desc-overlay-icon{
    display:block;
    width:64px;
    height:64px;
    margin:0 auto 16px;
    mask-repeat:no-repeat;
    mask-position:center;
    mask-size:contain;
    -webkit-mask-repeat:no-repeat;
    -webkit-mask-position:center;
    -webkit-mask-size:contain;
  }
  .desc-overlay-title{
    font-family:var(--font-display);
    font-size:1.5rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.5px;
    margin-bottom:14px;
    color:#fff;
  }
  .desc-overlay-text{
    font-size:1rem;
    line-height:1.6;
    color:rgba(244,242,255,0.85);
  }

  .hub-logo{
    width:100%;
    max-width:280px;
    aspect-ratio:1408 / 768;
    margin:4px auto 8px;
    mask-image:url('images/hub/logo-logo.svg');
    -webkit-mask-image:url('images/hub/logo-logo.svg');
    mask-repeat:no-repeat;
    -webkit-mask-repeat:no-repeat;
    mask-position:center;
    -webkit-mask-position:center;
    mask-size:contain;
    -webkit-mask-size:contain;
    background:linear-gradient(90deg, #9dc9ff, #e8929c, #c3b1f0, #9ee0da, #9dc9ff);
    background-size:250% auto;
    animation:hubTitleShine 3.5s ease-in-out infinite;
  }
  @keyframes hubTitleShine{
    0%, 100%{background-position:0% center;}
    50%{background-position:100% center;}
  }
  @media (prefers-reduced-motion: reduce){
    .hub-logo{animation:none;}
  }
</style>

<script>
(function(){
  "use strict";

  // the mode cards stay hidden (see .mode-grid:not(.ready) .mode-card in the
  // <style>) until every game icon has preloaded, so they all appear together
  // instead of popping in one by one as each icon happens to finish loading
  (function revealModeGridWhenReady(){
    var grid = document.querySelector('.mode-grid');
    if (!grid) return;
    var urls = Array.prototype.map.call(
      grid.querySelectorAll('.mode-info-btn'),
      function(btn){ return btn.getAttribute('data-icon'); }
    ).filter(Boolean);

    function reveal(){ grid.classList.add('ready'); }

    if (!urls.length){ reveal(); return; }
    var settled = 0;
    urls.forEach(function(url){
      var img = new Image();
      img.onload = img.onerror = function(){
        settled++;
        if (settled === urls.length) reveal();
      };
      img.src = url;
    });
    setTimeout(reveal, 1500); // safety net in case an icon never settles
  })();

  var backdrop = document.getElementById('desc-overlay-backdrop');
  var iconEl = document.getElementById('desc-overlay-icon');
  var titleEl = document.getElementById('desc-overlay-title');
  var textEl = document.getElementById('desc-overlay-text');
  var closeBtn = document.getElementById('desc-overlay-close');

  function openDesc(btn){
    var iconUrl = btn.getAttribute('data-icon') || '';
    var emoji = btn.getAttribute('data-emoji') || '';
    if (iconUrl){
      iconEl.textContent = '';
      iconEl.style.fontSize = '';
      iconEl.style.maskImage = 'url(\'' + iconUrl + '\')';
      iconEl.style.webkitMaskImage = iconEl.style.maskImage;
      iconEl.style.backgroundColor = btn.getAttribute('data-color') || '#fff';
    } else {
      iconEl.style.maskImage = 'none';
      iconEl.style.webkitMaskImage = 'none';
      iconEl.style.backgroundColor = 'transparent';
      iconEl.style.fontSize = '48px';
      iconEl.textContent = emoji;
    }
    titleEl.textContent = btn.getAttribute('data-title') || '';
    textEl.textContent = btn.getAttribute('data-desc') || '';
    backdrop.classList.remove('hidden');
  }
  function closeDesc(){
    backdrop.classList.add('hidden');
  }

  document.querySelectorAll('.mode-info-btn').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.preventDefault();
      e.stopPropagation();
      openDesc(btn);
    });
  });
  closeBtn.addEventListener('click', closeDesc);
  backdrop.addEventListener('click', function(e){
    if (e.target === backdrop) closeDesc();
  });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') closeDesc();
  });
})();
</script>
</body>
</html>
